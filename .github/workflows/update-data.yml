name: Update Dashboard Data

on:
  schedule:
    # Run every hour during US market hours (9 AM - 5 PM ET, Mon-Fri)
    # Cron is in UTC, so 9 AM ET = 13:00 UTC, 5 PM ET = 21:00 UTC
    - cron: '0 13-21 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance requests

      - name: Run data fetcher
        run: python fetch_data.py

      - name: Commit and push if changed
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Auto-update data - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Send notification
        if: steps.commit.outputs.changed == 'true'
        run: |
          python << 'PYEOF'
          import json
          import subprocess
          from datetime import datetime

          d = json.load(open('data.json'))
          m = d['metrics']

          sp500 = f"{m['sp500']['value']:.0f} ({m['sp500']['change_pct']:+.1f}%)"
          brent = f"${m['brent']['value']:.2f} ({m['brent']['change_pct']:+.1f}%)"
          gold = f"${m['gold']['value']:.0f} ({m['gold']['change_pct']:+.1f}%)"
          vix = f"{m['vix']['value']:.1f} ({m['vix']['change_pct']:+.1f}%)"

          msg = f"""Dashboard Updated {datetime.utcnow().strftime('%H:%M UTC')}

          S&P: {sp500}
          Brent: {brent}
          Gold: {gold}
          VIX: {vix}"""

          subprocess.run(['curl', '-d', msg, 'ntfy.sh/iran-dashboard-updates'])
          PYEOF
