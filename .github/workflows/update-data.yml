name: Update Dashboard Data

on:
  schedule:
    # Run every hour during US market hours (9 AM - 5 PM ET, Mon-Fri)
    # Cron is in UTC, so 9 AM ET = 13:00 UTC, 5 PM ET = 21:00 UTC
    - cron: '0 13-21 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance requests

      - name: Run data fetcher
        run: python fetch_data.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          git diff --staged --quiet || git commit -m "Auto-update data - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
