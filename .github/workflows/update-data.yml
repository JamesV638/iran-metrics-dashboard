name: Update Dashboard Data

on:
  schedule:
    # Run every hour during US market hours (9 AM - 5 PM ET, Mon-Fri)
    # Cron is in UTC, so 9 AM ET = 13:00 UTC, 5 PM ET = 21:00 UTC
    - cron: '0 13-21 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance requests

      - name: Run data fetcher
        run: python fetch_data.py

      - name: Commit and push if changed
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Auto-update data - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Send notification
        if: steps.commit.outputs.changed == 'true'
        run: |
          # Extract key metrics from data.json
          SP500=$(python -c "import json; d=json.load(open('data.json')); print(f\"{d['metrics']['sp500']['value']:.0f} ({d['metrics']['sp500']['change_pct']:+.1f}%)\")")
          BRENT=$(python -c "import json; d=json.load(open('data.json')); print(f\"\\${d['metrics']['brent']['value']:.2f} ({d['metrics']['brent']['change_pct']:+.1f}%)\")")
          GOLD=$(python -c "import json; d=json.load(open('data.json')); print(f\"\\${d['metrics']['gold']['value']:.0f} ({d['metrics']['gold']['change_pct']:+.1f}%)\")")
          VIX=$(python -c "import json; d=json.load(open('data.json')); print(f\"{d['metrics']['vix']['value']:.1f} ({d['metrics']['vix']['change_pct']:+.1f}%)\")")

          curl -d "Dashboard Updated $(date -u '+%H:%M UTC')

          S&P: $SP500
          Brent: $BRENT
          Gold: $GOLD
          VIX: $VIX" \
            ntfy.sh/iran-dashboard-updates
